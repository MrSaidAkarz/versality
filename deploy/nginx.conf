# ── Versality Nginx config ───────────────────────────────────────────────────
# 1. HTTP-only (works immediately with just an IP)
# 2. When you have a domain, follow the "ADD DOMAIN" steps at the bottom
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── STEP 1 (IP-only): leave server_name as _ ──────────────────────────
    server_name _;

    # ── Proxy /api/* → Express ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Serve React SPA static files ──────────────────────────────────────
    root /opt/versality/artifacts/openvizy/dist/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}


# ════════════════════════════════════════════════════════════════════════════
# ADD DOMAIN — run these steps once you have a domain pointing at this server
# ════════════════════════════════════════════════════════════════════════════
#
# 1. Point your domain's A record to this server's IP.
#
# 2. Replace `server_name _;` above with your domain:
#       server_name yourdomain.com www.yourdomain.com;
#
# 3. Install Certbot and get a free SSL cert:
#       sudo apt install -y certbot python3-certbot-nginx
#       sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
#    Certbot will automatically:
#      - Add an HTTPS server block (port 443)
#      - Add an HTTP → HTTPS redirect
#      - Set up auto-renewal via a systemd timer
#
# 4. Reload Nginx:
#       sudo nginx -t && sudo systemctl reload nginx
#
# That's it. No other changes needed — the rest of this config stays the same.
# ════════════════════════════════════════════════════════════════════════════
